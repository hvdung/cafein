services:
  # ── Frontend ─────────────────────────────────────────────
  frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile.dev
  container_name: cafein-frontend
  ports:
    - "3000:3000"
  volumes:
    - ./frontend:/app
    - /app/node_modules
    - /app/.next
  environment:
    - WATCHPACK_POLLING=true
    - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
  depends_on:
    - backend
  restart: unless-stopped
  networks:
    - cafein-net

  # ── Backend ──────────────────────────────────────────────
  backend:
  build:
    context: ./backend
    dockerfile: Dockerfile.dev
  container_name: cafein-backend
  ports:
    - "8000:8000"
  volumes:
    - ./backend:/app
    - /app/.venv
  env_file:
    - ./backend/.env
  depends_on:
    postgres:
    condition: service_healthy
    qdrant:
    condition: service_started
    redis:
    condition: service_started
  restart: unless-stopped
  networks:
    - cafein-net

  # ── Infrastructure ────────────────────────────────────────
  postgres:
  image: postgres:15-alpine
  container_name: cafein-postgres
  environment:
    POSTGRES_DB: restaurants_db
    POSTGRES_USER: user
    POSTGRES_PASSWORD: pass
  ports:
    - "5432:5432"
  volumes:
    - pg_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U user -d restaurants_db"]
    interval: 5s
    timeout: 5s
    retries: 10
  restart: unless-stopped
  networks:
    - cafein-net

  qdrant:
  image: qdrant/qdrant:latest
  container_name: cafein-qdrant
  ports:
    - "6333:6333"   # HTTP API + Dashboard
    - "6334:6334"   # gRPC
  volumes:
    - qdrant_data:/qdrant/storage
  restart: unless-stopped
  networks:
    - cafein-net

  redis:
  image: redis:7-alpine
  container_name: cafein-redis
  ports:
    - "6379:6379"
  volumes:
    - redis_data:/data
  restart: unless-stopped
  networks:
    - cafein-net

volumes:
  pg_data:
  qdrant_data:
  redis_data:

networks:
  cafein-net:
  driver: bridge
